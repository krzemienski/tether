# tether relay sshd drop-in — install to /etc/ssh/sshd_config.d/60-tether-keepalive.conf
#
# Why this exists (root cause of recurring tunnel outages):
# The relay holds the public reverse-tunnel port (e.g. :2222) on behalf of the
# roaming client. When the client drops ungracefully — laptop sleep, Wi-Fi
# change, NAT rebinding on a roaming network — the relay's sshd, with the stock
# default ClientAliveInterval=0, never notices and keeps the dead session's
# port binding alive indefinitely. The client respawns (launchd KeepAlive) but
# cannot rebind because of ExitOnForwardFailure=yes, so it exits immediately and
# launchd throttles it into a multi-minute "spawn scheduled" back-off. The
# tunnel stays externally dark for as long as the relay clings to the zombie
# binding — observed as 10-15 minute outages.
#
# Fix: make the relay actively probe its clients and reap dead ones within ~60s
# (30s interval x 2 missed = ~60s), freeing the port so the respawning client
# binds on its next attempt. Pairs with the client-side E2E stale probe in
# bin/tether-heal.sh, which kills the stale session from the client end too.
ClientAliveInterval 30
ClientAliveCountMax 2
TCPKeepAlive yes
